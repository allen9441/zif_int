name: Build Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller zif_calculator.spec

    - name: Upload Linux Artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: zif_calculator-linux
        path: dist/zif_calculator

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: zif_calculator-windows
        path: dist/zif_calculator.exe

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: zif_calculator-linux
          path: artifacts/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: zif_calculator-windows
          path: artifacts/windows

      - name: Rename artifacts
        run: |
          mkdir -p release_assets
          mv artifacts/linux/zif_calculator release_assets/zif_calculator-linux
          mv artifacts/windows/zif_calculator.exe release_assets/zif_calculator-windows.exe

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: "nightly"
        run: |
          gh release delete $TAG_NAME --cleanup-tag -y || true
          
          gh release create $TAG_NAME \
            --title "Nightly Build $(date +'%Y-%m-%d')" \
            --notes "Automated build from repository." \
            --prerelease \
            release_assets/*
